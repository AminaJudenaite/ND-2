<!DOCTYPE html>
<html lang="LT">
    <head>
    <meta charset="UTF-8">
    <meta name="description" content="Profesionalios anglų kalbos pamokos.">
    <meta name="keywords" content="Anglų kalbos kursai, Anglų kalbos pamokos">
    <title>Registracija</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="../stilius/style.css">
    <link rel="stylesheet" href="../stilius/papildomas.css">
</head>
<body>

<main>
    <h2>Užsiregistruokite kursams</h2>
    <form class="forma">
        <label for="vardas">Vardas, Pavardė:</label>
        <input type="text" id="vardas" required placeholder="Vardenis Pavardenis">

        <label for="pastas">El. paštas:</label>
        <input type="email" id="pastas" required placeholder="vardenis.pavardenis@gmail.com">

        <label for="lygis">Jūsų anglų k. lygis:</label>
        <select id="lygis">
            <option value="pradedantysis">Pradedantysis (A1-A2)</option>
            <option value="igudes">Įgudęs (B1-B2)</option>
            <option value="pazenges">Pažengęs (C1-C2)</option>
        </select>

        <input type="submit" value="Registruotis">
        <input type="reset" value="Atšaukti">
    </form>
    <img style="width: 500px; border-radius: 10px;" src="../nuotraukos/ILoveEnglish.png" alt="Anglų kalbos kursai">

    <div class="nuorodos">
        <a href="index.html">Pagrindinis</a>
        <a href="kursai.html">Kursai</a>
        <a href="apiemus.html">Apie mus</a>
        <a href="kontaktai.html">Kontaktai</a>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-
YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin=
"anonymous"></script>
    
</body>

</html>
